# Schema: workshop-facts.yaml
# Human-readable field documentation. The authoritative validation logic is in scripts/validate.py.
# When these two disagree, scripts/validate.py is correct — update this file to match.

workshop:
  title:
    type: string
    required: true
    description: Full display title of the workshop

  carpentry:
    type: string
    required: true
    allowed: [swc, dc, lc, cp, incubator]
    description: |
      Carpentries programme type.
      swc       = Software Carpentry
      dc        = Data Carpentry
      lc        = Library Carpentry
      cp        = Carpentries (generic)
      incubator = community lesson

  curriculum:
    type: string
    required: false
    allowed_by_carpentry:
      swc: [swc-inflammation, swc-gapminder]
      dc:  [dc-ecology, dc-astronomy, dc-genomics, dc-geospatial, dc-image, dc-socsci]
      lc:  []         # flexible — any value accepted; lc is common but not required
      cp:  []         # flexible
      incubator: []   # flexible
    notes: |
      Required for DC (build will warn if missing).
      Recommended for SWC. Flexible for LC, CP, and incubator.
      The validator warns (not errors) on unknown values for swc.

  flavor:
    type: string
    required: false
    allowed: [python, r, null]
    description: Language flavor. Relevant for SWC and DC workshops.

event:
  start_date:
    type: date      # YYYY-MM-DD
    required: true

  end_date:
    type: date      # YYYY-MM-DD; must be >= start_date
    required: true

  mode:
    type: string
    required: true
    allowed: [in-person, online, hybrid]

  venue:
    type: string
    required: true
    description: Human-readable venue name, e.g. "UCLA Powell Library, Room 230" or "Online (Zoom)"

  address:
    type: string
    required: true
    description: |
      Full street address for in-person workshops.
      Use "online" for virtual workshops.
      Maps to index.md `address` field.

  country:
    type: string
    required: true
    description: |
      ISO 3166-1 alpha-2 country code, e.g. us, gb, ca, au.
      Maps to index.md `country` field.

  language:
    type: string
    required: true
    description: |
      ISO 639-1 language code, e.g. en, fr, es.
      Maps to index.md `language` field.

  host:
    type: string
    required: false
    description: Hosting institution name.

  timezone:
    type: string
    required: false
    example: "PT"

  daily_start:
    type: time      # HH:MM 24h
    required: false

  daily_end:
    type: time      # HH:MM 24h
    required: false

people:
  instructors:
    type: list[string]
    required: true
    min_items: 1
    description: Full names of instructors. Blank entries are an error.

  helpers:
    type: list[string]
    required: false
    description: Full names of helpers. Blank entries produce a warning.

  contact_emails:
    type: list[email]
    required: true
    min_items: 1
    description: |
      List of contact email addresses. Maps to the index.md `email` field (displayed on the workshop page).
      Use a list even for a single address.
    deprecated_alias: contact_email   # singular string; accepted with a warning

github:
  owner:
    type: string
    required: true
    description: GitHub org or personal username.

  repo_name:
    type: string
    required: true
    pattern: "^\\d{4}-\\d{2}-\\d{2}-[a-z][a-z0-9-]*[a-z0-9]$"
    description: |
      Full repo name. Must follow YYYY-MM-DD-<slug>.
      Slug must be lowercase, start with a letter, and not end with - or _.
      Must begin with the same date as event.start_date.

lessons:
  type: list
  required: false
  items:
    name:
      type: string
      required: true
    url:
      type: string
      required: false

links:
  registration:
    type: string
    required: false
    tbd_allowed: true

  collaborative_notes:
    type: string
    required: false
    tbd_allowed: true

  eventbrite_key:
    type: string
    required: false
    nullable: true
    description: Alphanumeric Eventbrite key only — not the full URL.

schedule_notes:
  type: string
  required: false
  tbd_allowed: true
  description: Free-text notes the agent uses when drafting schedule HTML.
