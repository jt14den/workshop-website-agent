# Example: Data Carpentry (Ecology) — online, 4-day spread across 2 weeks
# Copy to workshop-facts.yaml and edit for your event.

workshop:
  title: "Data Carpentry: Ecology Workshop"
  carpentry: dc
  curriculum: dc-ecology
  flavor: r

event:
  start_date: 2026-10-05
  end_date: 2026-10-14
  mode: online
  venue: "Online (Zoom)"
  host: "University Library Consortium"
  timezone: "ET"
  daily_start: "13:00"
  daily_end: "17:00"

people:
  instructors:
    - "Maria Chen"
    - "David Kim"
  helpers:
    - "Fatima Hassan"
  contact_email: "carpentries@university.edu"

